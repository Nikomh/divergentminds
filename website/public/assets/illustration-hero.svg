<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Abstract community/brain-network illustration for hero section -->

  <!-- Soft background blobs -->
  <ellipse cx="120" cy="180" rx="100" ry="90" fill="#3730A3" opacity="0.04"/>
  <ellipse cx="360" cy="140" rx="90" ry="80" fill="#0D9488" opacity="0.05"/>
  <ellipse cx="280" cy="280" rx="80" ry="70" fill="#F97316" opacity="0.04"/>

  <!-- ── Central brain cluster ──────────────────────────────── -->
  <!-- Main head shape (stylized, geometric) -->
  <path d="M240,60 C200,60 170,85 170,118 C170,148 188,168 212,176 C216,178 220,180 224,181 L224,195 L256,195 L256,181 C260,180 264,178 268,176 C292,168 310,148 310,118 C310,85 280,60 240,60 Z"
    stroke="#3730A3" stroke-width="2.5" fill="#3730A3" fill-opacity="0.04"/>

  <!-- Brain fold lines -->
  <path d="M210,95 C220,88 235,92 240,100 C245,108 255,108 265,102"
    stroke="#3730A3" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M205,112 C215,106 228,110 235,120 C242,130 252,128 265,122"
    stroke="#3730A3" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M208,130 C218,125 230,130 238,140"
    stroke="#3730A3" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- ── People nodes (community members) ──────────────────── -->
  <!-- Node: person A (left) -->
  <circle cx="80"  cy="120" r="22" fill="#3730A3" fill-opacity="0.08" stroke="#3730A3" stroke-width="2"/>
  <circle cx="80"  cy="110" r="8"  fill="#3730A3" fill-opacity="0.25"/>
  <path d="M62,132 C62,125 70,120 80,120 C90,120 98,125 98,132"
    stroke="#3730A3" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Node: person B (right) -->
  <circle cx="400" cy="100" r="22" fill="#0D9488" fill-opacity="0.08" stroke="#0D9488" stroke-width="2"/>
  <circle cx="400" cy="90"  r="8"  fill="#0D9488" fill-opacity="0.25"/>
  <path d="M382,112 C382,105 390,100 400,100 C410,100 418,105 418,112"
    stroke="#0D9488" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Node: person C (bottom-left) -->
  <circle cx="110" cy="280" r="20" fill="#F97316" fill-opacity="0.08" stroke="#F97316" stroke-width="2"/>
  <circle cx="110" cy="271" r="7"  fill="#F97316" fill-opacity="0.25"/>
  <path d="M94,290 C94,284 101,280 110,280 C119,280 126,284 126,290"
    stroke="#F97316" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Node: person D (bottom-right) -->
  <circle cx="380" cy="260" r="20" fill="#EAB308" fill-opacity="0.08" stroke="#EAB308" stroke-width="2"/>
  <circle cx="380" cy="251" r="7"  fill="#EAB308" fill-opacity="0.25"/>
  <path d="M364,270 C364,264 371,260 380,260 C389,260 396,264 396,270"
    stroke="#EAB308" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Node: person E (bottom-center) -->
  <circle cx="240" cy="310" r="22" fill="#3730A3" fill-opacity="0.08" stroke="#3730A3" stroke-width="2"/>
  <circle cx="240" cy="300" r="8"  fill="#3730A3" fill-opacity="0.20"/>
  <path d="M222,322 C222,315 230,310 240,310 C250,310 258,315 258,322"
    stroke="#3730A3" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- ── Connection lines (community bonds) ─────────────────── -->
  <!-- Brain → Person A -->
  <path d="M175,130 C145,126 112,124 102,122"
    stroke="#3730A3" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.25" stroke-linecap="round"/>
  <!-- Brain → Person B -->
  <path d="M305,115 C330,110 365,106 378,104"
    stroke="#0D9488" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.25" stroke-linecap="round"/>
  <!-- Brain → Person C -->
  <path d="M195,185 C175,215 145,255 128,272"
    stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.25" stroke-linecap="round"/>
  <!-- Brain → Person D -->
  <path d="M282,185 C310,215 348,240 362,254"
    stroke="#EAB308" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.25" stroke-linecap="round"/>
  <!-- Brain → Person E -->
  <path d="M240,195 L240,288"
    stroke="#3730A3" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.20" stroke-linecap="round"/>
  <!-- Person A ↔ Person C -->
  <path d="M80,142 L110,260"
    stroke="#3730A3" stroke-width="1" stroke-dasharray="3,4" opacity="0.12" stroke-linecap="round"/>
  <!-- Person B ↔ Person D -->
  <path d="M400,122 L380,240"
    stroke="#3730A3" stroke-width="1" stroke-dasharray="3,4" opacity="0.12" stroke-linecap="round"/>
  <!-- Person C ↔ Person E -->
  <path d="M128,280 C175,295 205,305 218,310"
    stroke="#3730A3" stroke-width="1" stroke-dasharray="3,4" opacity="0.12" stroke-linecap="round"/>
  <!-- Person D ↔ Person E -->
  <path d="M362,268 C330,285 275,305 262,310"
    stroke="#3730A3" stroke-width="1" stroke-dasharray="3,4" opacity="0.12" stroke-linecap="round"/>

  <!-- ── Rotating arrows motif (from logo, miniaturized) ───── -->
  <g transform="translate(240,120)">
    <path d="M3,-14 A14,14 0 0,1 14,-3"
      stroke="#0D9488" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M14,3 A14,14 0 0,1 3,14"
      stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M-3,14 A14,14 0 0,1 -14,3"
      stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M-14,-3 A14,14 0 0,1 -3,-14"
      stroke="#EAB308" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Small decorative sparks/nodes -->
  <circle cx="155" cy="60"  r="3" fill="#3730A3" opacity="0.15"/>
  <circle cx="325" cy="55"  r="2" fill="#0D9488" opacity="0.15"/>
  <circle cx="445" cy="200" r="3" fill="#F97316" opacity="0.12"/>
  <circle cx="35"  cy="220" r="2" fill="#EAB308" opacity="0.12"/>
  <circle cx="200" cy="340" r="2" fill="#3730A3" opacity="0.10"/>
  <circle cx="310" cy="340" r="2" fill="#3730A3" opacity="0.10"/>
</svg>
