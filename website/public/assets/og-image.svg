<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- OG Social Card — 1200×630 -->

  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F7F4"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="bg-glow-1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#3730A3" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3730A3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-glow-1)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-2)"/>

  <!-- Neural network decoration (top-right) -->
  <g opacity="0.12">
    <circle cx="900"  cy="80"  r="6" fill="#3730A3"/>
    <circle cx="980"  cy="140" r="4" fill="#3730A3"/>
    <circle cx="1050" cy="80"  r="5" fill="#0D9488"/>
    <circle cx="1120" cy="160" r="4" fill="#3730A3"/>
    <circle cx="1000" cy="200" r="5" fill="#F97316"/>
    <line x1="900" y1="80"  x2="980" y2="140" stroke="#3730A3" stroke-width="1.5"/>
    <line x1="980" y1="140" x2="1050" y2="80"  stroke="#3730A3" stroke-width="1.5"/>
    <line x1="1050" y1="80"  x2="1120" y2="160" stroke="#3730A3" stroke-width="1.5"/>
    <line x1="980" y1="140" x2="1000" y2="200" stroke="#F97316" stroke-width="1.5"/>
    <line x1="1120" y1="160" x2="1000" y2="200" stroke="#3730A3" stroke-width="1.5"/>
  </g>

  <!-- Bottom-left decoration -->
  <g opacity="0.10">
    <circle cx="80"  cy="540" r="5" fill="#EAB308"/>
    <circle cx="160" cy="580" r="4" fill="#3730A3"/>
    <circle cx="50"  cy="600" r="3" fill="#0D9488"/>
    <line x1="80" y1="540" x2="160" y2="580" stroke="#3730A3" stroke-width="1.5"/>
    <line x1="80" y1="540" x2="50" y2="600" stroke="#EAB308" stroke-width="1.5"/>
  </g>

  <!-- Logo icon (large, centered-left) -->
  <g transform="translate(120, 160)">
    <!-- Head -->
    <path d="M120,20 C76,20 42,50 42,98 C42,140 64,164 96,174 C102,176 110,180 120,180 C130,180 138,176 144,174 C176,164 198,140 198,98 C198,50 164,20 120,20 Z"
      stroke="#3730A3" stroke-width="8" stroke-linejoin="round"/>

    <!-- Brain arrows (center 120,92), radius 32 -->
    <defs>
      <marker id="og-ah-teal"   markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L8,5 L0,10 Z" fill="#0D9488"/>
      </marker>
      <marker id="og-ah-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L8,5 L0,10 Z" fill="#F97316"/>
      </marker>
      <marker id="og-ah-red"    markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L8,5 L0,10 Z" fill="#EF4444"/>
      </marker>
      <marker id="og-ah-yellow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0,0 L8,5 L0,10 Z" fill="#EAB308"/>
      </marker>
    </defs>
    <path d="M125.6,61 A32,32 0 0,1 151,88"   stroke="#0D9488" stroke-width="13" stroke-linecap="round" marker-end="url(#og-ah-teal)"/>
    <path d="M151,98 A32,32 0 0,1 125.6,125"  stroke="#F97316" stroke-width="13" stroke-linecap="round" marker-end="url(#og-ah-orange)"/>
    <path d="M114.4,125 A32,32 0 0,1 89,98"   stroke="#EF4444" stroke-width="13" stroke-linecap="round" marker-end="url(#og-ah-red)"/>
    <path d="M89,88 A32,32 0 0,1 114.4,61"    stroke="#EAB308" stroke-width="13" stroke-linecap="round" marker-end="url(#og-ah-yellow)"/>
  </g>

  <!-- Text content -->
  <!-- Label -->
  <text x="400" y="210"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="18" font-weight="600" fill="#3730A3" letter-spacing="5">
    BERLIN · ADHS COMMUNITY
  </text>

  <!-- Headline -->
  <text x="400" y="300"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="68" font-weight="800" fill="#1e2d5a" letter-spacing="-2">
    DIVERGENT
  </text>
  <text x="400" y="380"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="68" font-weight="800" fill="#1e2d5a" letter-spacing="-2">
    MINDS
  </text>

  <!-- Tagline -->
  <text x="402" y="440"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="26" font-weight="400" fill="#5a6480" letter-spacing="-0.3">
    Gemeinsam ADHS meistern – vernetzt, gestärkt, informiert
  </text>

  <!-- URL -->
  <text x="402" y="510"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    font-size="18" font-weight="500" fill="#3730A3" opacity="0.7">
    divergentminds.berlin
  </text>
</svg>
