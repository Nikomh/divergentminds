  <circle cx="190" cy="50"  r="2" fill="#3730A3" opacity="0.06"/>

  <!-- Connections -->
  <line x1="20"  y1="40"  x2="70"  y2="20"  stroke="#3730A3" stroke-width="0.8" opacity="0.08"/>
  <line x1="70"  y1="20"  x2="120" y2="50"  stroke="#3730A3" stroke-width="0.8" opacity="0.08"/>
  <line x1="120" y1="50"  x2="170" y2="25"  stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="20"  y1="40"  x2="50"  y2="90"  stroke="#3730A3" stroke-width="0.8" opacity="0.08"/>
  <line x1="70"  y1="20"  x2="100" y2="110" stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="120" y1="50"  x2="100" y2="110" stroke="#0D9488" stroke-width="0.8" opacity="0.08"/>
  <line x1="120" y1="50"  x2="150" y2="80"  stroke="#3730A3" stroke-width="0.8" opacity="0.08"/>
  <line x1="170" y1="25"  x2="150" y2="80"  stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="150" y1="80"  x2="180" y2="110" stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="50"  y1="90"  x2="100" y2="110" stroke="#F97316" stroke-width="0.8" opacity="0.08"/>
  <line x1="50"  y1="90"  x2="30"  y2="150" stroke="#3730A3" stroke-width="0.8" opacity="0.08"/>
  <line x1="100" y1="110" x2="80"  y2="160" stroke="#3730A3" stroke-width="0.8" opacity="0.08"/>
  <line x1="100" y1="110" x2="130" y2="145" stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="150" y1="80"  x2="130" y2="145" stroke="#0D9488" stroke-width="0.8" opacity="0.06"/>
  <line x1="180" y1="110" x2="175" y2="165" stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="30"  y1="150" x2="10"  y2="185" stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="80"  y1="160" x2="60"  y2="190" stroke="#3730A3" stroke-width="0.8" opacity="0.06"/>
  <line x1="130" y1="145" x2="140" y2="190" stroke="#3730A3" stroke-width="0.8" opacity="0.05"/>
  <line x1="175" y1="165" x2="140" y2="190" stroke="#3730A3" stroke-width="0.8" opacity="0.05"/>
