<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Neural network pattern: nodes + connections -->
  <!-- Nodes -->
  <circle cx="20"  cy="40"  r="3" fill="#3730A3" opacity="0.12"/>
  <circle cx="70"  cy="20"  r="2" fill="#3730A3" opacity="0.10"/>
  <circle cx="120" cy="50"  r="3" fill="#0D9488" opacity="0.12"/>
  <circle cx="170" cy="25"  r="2" fill="#3730A3" opacity="0.08"/>
  <circle cx="50"  cy="90"  r="2" fill="#F97316" opacity="0.10"/>
  <circle cx="100" cy="110" r="3" fill="#3730A3" opacity="0.12"/>
  <circle cx="150" cy="80"  r="2" fill="#0D9488" opacity="0.10"/>
  <circle cx="180" cy="110" r="3" fill="#3730A3" opacity="0.08"/>
  <circle cx="30"  cy="150" r="2" fill="#3730A3" opacity="0.10"/>
  <circle cx="80"  cy="160" r="3" fill="#F97316" opacity="0.10"/>
  <circle cx="130" cy="145" r="2" fill="#3730A3" opacity="0.08"/>
  <circle cx="175" cy="165" r="3" fill="#0D9488" opacity="0.10"/>
